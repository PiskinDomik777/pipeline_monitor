<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Система ВТД{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand {
            font-weight: bold;
        }
        .risk-critical { background-color: #dc3545; color: white; }
        .risk-high { background-color: #fd7e14; color: white; }
        .risk-medium { background-color: #ffc107; color: black; }
        .risk-low { background-color: #28a745; color: white; }
        .footer {
            margin-top: 50px;
            padding: 20px;
            text-align: center;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🔧 ВТД Мониторинг</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/upload">Загрузка данных</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/defects">Дефекты</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/report">Отчет</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <p>© 2024 - Дипломный проект: Разработка информационной системы для сбора и анализа данных внутритрубной диагностики</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Переключатель темы -->
    <div class="theme-switch-wrapper" style="position: fixed; bottom: 20px; right: 20px; z-index: 1000;">
        <label class="theme-switch" for="themeCheckbox">
            <input type="checkbox" id="themeCheckbox" />
            <div class="slider round">
                <span class="sun">☀️</span>
                <span class="moon">🌙</span>
            </div>
        </label>
    </div>

    <style>
        /* Переключатель темы */
        .theme-switch-wrapper {
            display: flex;
            align-items: center;
        }
        
        .theme-switch {
            display: inline-block;
            position: relative;
            width: 60px;
            height: 30px;
            cursor: pointer;
        }
        
        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #003366;
            transition: 0.4s;
            border-radius: 30px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
            z-index: 2;
        }
        
        .sun, .moon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            z-index: 1;
        }
        
        .sun {
            left: 8px;
            color: white;
        }
        
        .moon {
            right: 8px;
            color: white;
        }
        
        input:checked + .slider {
            background-color: #2c3e50;
        }
        
        input:checked + .slider:before {
            transform: translateX(30px);
        }
        
        /* ========== ТЁМНАЯ ТЕМА ========== */
        body.dark-theme {
            background: #1a1a2e;
            color: #e0e0e0;
        }
        
        body.dark-theme .header {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
        }
        
        body.dark-theme .nav {
            background: #0d1117;
            border-bottom-color: #003366;
        }
        
        body.dark-theme .nav-link {
            color: #e0e0e0;
        }
        
        body.dark-theme .nav-link:hover,
        body.dark-theme .nav-link.active {
            color: #0055a5;
        }
        
        body.dark-theme .stat-card,
        body.dark-theme .actions-panel,
        body.dark-theme .info-panel,
        body.dark-theme .card,
        body.dark-theme .table-container,
        body.dark-theme .filters,
        body.dark-theme .report-container,
        body.dark-theme .page-header .stats-badge {
            background: #0d1117;
            color: #e0e0e0;
            border-color: #30363d;
        }
        
        body.dark-theme .stat-card {
            border-left-color: #003366;
        }
        
        body.dark-theme .stat-card h3 {
            color: #8b949e;
        }
        
        body.dark-theme .info-panel {
            background: #0d1117;
            border-left-color: #003366;
        }
        
        body.dark-theme .info-panel li:before {
            color: #27ae60;
        }
        
        body.dark-theme table {
            background: #0d1117;
        }
        
        body.dark-theme th {
            background: #003366;
            color: white;
        }
        
        body.dark-theme td {
            border-bottom-color: #30363d;
            color: #e0e0e0;
        }
        
        body.dark-theme tr:hover {
            background: #1f242f;
        }
        
        body.dark-theme .footer {
            background: #0d1117;
        }
        
        body.dark-theme .filters .filter-group select,
        body.dark-theme .filters .filter-group input {
            background: #0d1117;
            border-color: #30363d;
            color: #e0e0e0;
        }
        
        body.dark-theme .btn-outline {
            border-color: #003366;
            color: #0055a5;
        }
        
        body.dark-theme .user-info {
            background: rgba(255,255,255,0.1);
        }
        
        body.dark-theme .welcome {
            background: #0d1117;
            border-left-color: #003366;
        }
        
        body.dark-theme .alert-success {
            background: #1e4620;
            color: #d4edda;
            border-color: #2d6a2d;
        }
        
        body.dark-theme .alert-danger {
            background: #5a1e1e;
            color: #f8d7da;
            border-color: #8b2a2a;
        }
        
        body.dark-theme .risk-medium {
            background: #ffc107;
            color: #333;
        }
    </style>

    <script>
        // Проверяем сохранённую тему при загрузке
        const currentTheme = localStorage.getItem('theme');
        const themeCheckbox = document.getElementById('themeCheckbox');
        
        if (currentTheme === 'dark') {
            document.body.classList.add('dark-theme');
            if (themeCheckbox) themeCheckbox.checked = true;
        }
        
        // Обработчик переключения темы
        if (themeCheckbox) {
            themeCheckbox.addEventListener('change', function() {
                if (this.checked) {
                    document.body.classList.add('dark-theme');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.body.classList.remove('dark-theme');
                    localStorage.setItem('theme', 'light');
                }
            });
        }
    </script>
</body>
</html>
